<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" type="text/css" href="./style.css">
  
  <title>Frontend Mentor | Product list with cart</title>
</head>
<body>
  <main class="card">

    <div class="product__page">
      <h1 class="card__title">Desserts</h1>
      <section class="card__deserts">             
      </section>  
    </div>
    
    <aside class="cart__summary">
      <h2 class="cart__quantity">Your Cart (<span id="cart-count">0</span>)</h2>
      
      <div class="cart__state--empty">
        <img src="./assets/images/illustration-empty-cart.svg" alt="empty cart">
        <span class="cart__info">Your added items will appear here</span>
      </div>

      <div class="cart__state--selected">        
        <div class="cart__items-container">   
        </div>        
        <div class="separator-second"></div> 
      
        <div class="cart__total">
            <span>Order Total</span>
            <strong class="cart__total-price">$46.50</strong>
        </div>

        <div class="cart__delivery-info">
            <img src="./assets/images/icon-carbon-neutral.svg" alt="tree">
            <p>This is a <span>carbon-neutral</span> delivery</p>
        </div>

        <button class="cart__btn-confirm">Confirm Order</button>
      </div>        
    </aside>

  </main> 
  
  <section class="order-modal">    
    <div class="order-modal__content">
        <img src="./assets/images/icon-order-confirmed.svg" alt="confirmed">
        <h2 class="order-modal__title">Order Confirmed</h2>
        <p class="order-modal__subtitle">We hope you enjoy your food!</p>
        
        <div class="order-modal__summary">
          <div class="order-modal__items-container"></div>
          
          <div class="order-modal__separator-second"></div>

          <div class="order-modal__total-container">
              <span>Order Total</span>
              <strong class="order-modal__total-price">$46.50</strong>
          </div>
        </div> 

        <button class="order-modal__btn-new">Start New Order</button>
    </div>
  </section>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" class="attribution-link" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Saliva-sys" class="attribution-link" target="_blank" rel="noopener">Adriana Weidlichova</a>.
  </footer>

  <script src="script.js"></script>

  <template class="card-deserts">
    <article class="product__card is-selected" data-thumbnail="./assets/images/image-waffle-thumbnail.jpg">

          <div class="product__image--container">
            <picture>
              <source media="(min-width: 600px)" srcset="./assets/images/image-waffle-desktop.jpg">
              <source media="(min-width: 400px)" srcset="./assets/images/image-waffle-tablet.jpg">
              <img src="./assets/images/image-waffle-mobile.jpg" alt="Waffle with Berries">
            </picture>

            <button type="button" class="product__add--btn active">
              <div class="add-content">
                <img src="./assets/images/icon-add-to-cart.svg" alt="add to cart"> <span class="add-cart"> Add to Cart</span>
              </div>

              <div class="quantity-content">
                <div class="qty-btn-container">
                    <img src="./assets/images/icon-decrement-quantity.svg" alt="minus" class="qty-img">
                </div>
                <span>1</span>
                <div class="qty-btn-container">
                    <img src="./assets/images/icon-increment-quantity.svg" alt="plus" class="qty-img">
                </div>
              </div>
            </button>
          </div>

          <div class="product__info">
            <span class="product__category">Waffle</span>
            <h2 class="product__name">Waffle with Berries</h2>          
            <span class="product__price">6.50</span>
          </div>
          
        </article>
  </template>

  <template class="card-summary">
    <div class="cart__items-container">
          <div class="cart__item">
            <div class="cart__item-details">
              <p class="cart__item-name">Classic Tiramisu</p>
              <div class="cart__item-meta">
                <span class="cart__item-count">1x</span>
                <span class="cart__item-price">@ $5.50</span>
                <span class="cart__item-subtotal">$5.00</span>
              </div>
            </div>
            <button class="cart__item-remove">
              <img src="./assets/images/icon-remove-item.svg" alt="remove">
            </button>
          </div>
        </div>

        <div class="separator"></div>
  </template>

  <template class="order-modal">
    <div class="order-modal__summary">
          <div class="order-modal__item">
            <img src="./assets/images/image-tiramisu-thumbnail.jpg" alt="thumbnail" class="order-modal__item-img">
            <div class="order-modal__item-info">
              <p class="order-modal__item-name">Classic Tiramisu</p>
              <div class="order-modal__item-meta"> 
                <span class="order__item-count">1x</span>
                <span class="order__item-price">@ $5.50</span>
              </div>
            </div>
            <strong class="order-modal__item-subtotal">$5.50</strong>
          </div>
          
          <div class="order-modal__separator"></div> 
  </template>
  
</body>
</html>
