<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" type="text/css" href="./style.css">
  
  <title>Frontend Mentor | Product list with cart</title>
</head>
<body>
  <main class="card">

    <div class="product__page">
      <h1 class="card__title">Desserts</h1>
      <section class="card__deserts" aria-labelledby="desserts-heading">            
        <h2 id="desserts-heading" class="sr-only">Our available desserts</h2>
      </section>  
    </div>
    
    <aside class="cart__summary">
      <h2 class="cart__quantity">Your Cart (<span id="cart-count">0</span>)</h2>
      
      <div class="cart__state--empty">
        <img src="./assets/images/illustration-empty-cart.svg" alt="" aria-hidden="true">
        <span class="cart__notice">Your added items will appear here</span>
      </div>

      <div class="cart__state--selected">        
        <div class="cart__items-container"></div>        
        <div class="separator-second"></div> 
      
        <div class="cart__total">
            <span>Order Total</span>
            <strong class="cart__total-price">$0.00</strong>
        </div>

        <div class="cart__delivery-info">
            <img src="./assets/images/icon-carbon-neutral.svg" alt="" aria-hidden="true">
            <p>This is a <span>carbon-neutral</span> delivery</p>
        </div>

        <button type="button" class="cart__btn-confirm">Confirm Order</button>
      </div>        
    </aside>
  </main> 
  
  <section class="order-modal" aria-modal="true" role="dialog">   
    <div class="order-modal__content">
        <img src="./assets/images/icon-order-confirmed.svg" alt="" aria-hidden="true">
        <h2 class="order-modal__title">Order Confirmed</h2>
        <p class="order-modal__subtitle">We hope you enjoy your food!</p>
        
        <div class="order-modal__summary">
          <div class="order-modal__items-container"></div>          
          <div class="order-modal__separator-second"></div>
          <div class="order-modal__total-container">
              <span>Order Total</span>
              <strong class="order-modal__total-price">$0.00</strong>
          </div>
        </div> 

        <button type="button" class="order-modal__btn-new">Start New Order</button>
    </div>
  </section>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" class="attribution-link" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Saliva-sys" class="attribution-link" target="_blank" rel="noopener">Adriana Weidlichova</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
